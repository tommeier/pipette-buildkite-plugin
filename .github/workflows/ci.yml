name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: '1.17'
            otp: '27'
          - elixir: '1.18'
            otp: '27'
          - elixir: '1.18'
            otp: '28'
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix test
      - run: mix format --check-formatted

  lint-plugin:
    name: Lint plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run plugin linter
        run: |
          docker run --rm -v "$PWD:/plugin:ro" \
            buildkite/plugin-linter \
            --id tommeier/pipette \
            --path /plugin

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: shellcheck hooks/*

  bats:
    name: BATS tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run BATS tests
        run: |
          docker run --rm \
            -v "$PWD:/plugin" \
            -w /plugin \
            -e BATS_TMPDIR=/tmp \
            bats/bats:latest tests/
